system {
    host-name pe2;
    root-authentication {
        encrypted-password $1$qM7/Mbsk$ANhYtc0g0ajCGOttsRxsD1;
    }
    default-address-selection;
    login {
        user admin {
            class super-user;
            authentication {
                encrypted-password $1$qM7/Mbsk$ANhYtc0g0ajCGOttsRxsD1;
                ssh-rsa "ssh-rsa ";
                }
        }
    }
    services {
        ssh {
            root-login allow;
            sftp-server;
        }
        netconf {
            ssh;
        }
    }
    syslog {
        user * {
            any emergency;
        }
        file messages {
            any notice;
            authorization info;
        }
        file interactive-commands {
            interactive-commands any;
        }
    }
    
}
system {
    management-instance;
}

chassis {
    network-services enhanced-ip;
}
interfaces {
   fxp0 {
      unit 0 {
         family inet {
         address 172.16.11.22/24;
         }
      }
    }
}
interfaces {
lo0 {
        unit 0 {
        family inet {
                address 172.16.255.2/32 {
                    primary;
                    preferred;
                }
                }
        family iso {
                address 49.0001.0001.0002.00;
            }
            }
        }
ge-0/0/0 {
        mtu 9000;
        description "connection to port eth2 of lxc";
        }
ge-0/0/1 {
        mtu 9000;
        description "connection to port eth6 of lxc";
        }
ge-0/0/2 {
        mtu 9000;
        description "connection to port ge-0/0/1 of p1";
        unit 0 {
        family inet {
                address 172.16.20.6/31;
                }
        family mpls;
        family iso;
            }
        }
ge-0/0/3 {
        mtu 9000;
        description "connection to port ge-0/0/1 of p2";
        unit 0 {
        family inet {
                address 172.16.20.8/31;
                }
        family mpls;
        family iso;
            }
        }
}
protocols { 
	isis {
                level 2 {
                        authentication-key "$9$H.fQ69A0BE9CK8LxsYTzF/9AtuO1Ec"; ## SECRET-DATA
                        authentication-type md5;
                    }
                        interface  lo0.0 {
                                    level 1 disable;
                                    passive; 
                                    }
                            interface  ge-0/0/2.0 {
                                    level 1 disable;
                                    family inet {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                        family inet6 {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                    point-to-point; 
                                    }
                            interface  ge-0/0/3.0 {
                                    level 1 disable;
                                    family inet {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                        family inet6 {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                    point-to-point; 
                                    }
                            }
        mpls {
                statistics {
                        interval 10;
                    }
                    sensor-based-stats;
                    
                                interface ge-0/0/2.0;
                            
                                interface ge-0/0/3.0;
                            }
        rsvp {
                
                                interface ge-0/0/2.0;
                            
                                interface ge-0/0/3.0;
                            }
        ldp {
                
                                interface ge-0/0/2.0;
                            
                                interface ge-0/0/3.0;
                            }
        }
protocols {
   lldp {
      interface all;
      interface fxp0 {
        disable;
      }
      }
}
routing-options {
    router-id 172.16.255.2;
    route-distinguisher-id 172.16.255.2;
       
    forwarding-table {
        export LB;
    }
}
policy-options {
    policy-statement LB {
        term 1 {
            then {
                load-balance per-flow;
                accept;
            }
        }
    }
}
