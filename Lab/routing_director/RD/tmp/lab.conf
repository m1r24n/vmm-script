       ncpus 16;
       memory 32768;
       setvar "+qemu_args" "-cpu host,+vmx";
       setvar "attach_usb" "0";
       setvar "enable_vnc" "1";
       
       interface "em0" { bridge "control";};
        
    };
    vm "node3" {
       hostname "node3";
       rd_disk
       disk "hdb" "/vmm/data/user_disks/irzan/vm/rd35/node3_disk2.img";
       ncpus 16;
       memory 32768;
       setvar "+qemu_args" "-cpu host,+vmx";
       setvar "attach_usb" "0";
       setvar "enable_vnc" "1";
       
       interface "em0" { bridge "control";};
        
    };
    vm "node4" {
       hostname "node4";
       rd_disk
       disk "hdb" "/vmm/data/user_disks/irzan/vm/rd35/node4_disk2.img";
       ncpus 16;
       memory 32768;
       setvar "+qemu_args" "-cpu host,+vmx";
