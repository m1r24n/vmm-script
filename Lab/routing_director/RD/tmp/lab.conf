#include "/vmm/bin/common.defs"
#include "/vmm/data/user_disks/vmxc/common.vmx.p3.defs"
#include "/vmm/data/user_disks/vptxc/common.evovptx.ardbeg.defs"
#include "/vmm/data/user_disks/vptxc/common.ardbeg.defs"
#undef gw_disk 
#define gw_disk basedisk "/vmm/data/user_disks/irzan/images/gw2.qcow2";
#undef ubuntu_disk 
#define ubuntu_disk basedisk "/vmm/data/user_disks/irzan/images/ubuntu24.04.qcow2";
#undef rd_disk 
#define rd_disk basedisk "/vmm/data/user_disks/irzan/images/rd/rd-2.8.0.qcow2";
config "rd35" {
    bridge "control"{};
    bridge "reserved_bridge"{};
    
    vm "gw" {
       hostname "gw";
       gw_disk
       ncpus 2;
       memory 4096;
       setvar "+qemu_args" "-cpu qemu64,+vmx";
       setvar "attach_usb" "0";
       
       interface "em0" { bridge "external";};
       interface "em1" { bridge "control";};
        
    };
    vm "ac" {
       hostname "ac";
       ubuntu_disk
       ncpus 4;
       memory 16384;
       setvar "+qemu_args" "-cpu qemu64,+vmx";
       setvar "attach_usb" "0";
       setvar "enable_vnc" "1";
       
       interface "em0" { bridge "control";};
        
    };
    vm "node1" {
       hostname "node1";
       rd_disk
       disk "hdb" "/vmm/data/user_disks/irzan/vm/rd35/node1_disk2.img";
       ncpus 16;
       memory 32768;
       setvar "+qemu_args" "-cpu host,+vmx";
       setvar "attach_usb" "0";
       setvar "enable_vnc" "1";
       
       interface "em0" { bridge "control";};
        
    };
    vm "node2" {
       hostname "node2";
