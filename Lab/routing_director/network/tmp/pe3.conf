system {
    host-name pe3;
    root-authentication {
        encrypted-password $1$NuiODJw8$8pC.twS9boDqDHmLHe9vQ/;
    }
    default-address-selection;
    login {
        user admin {
            class super-user;
            authentication {
                encrypted-password $1$NuiODJw8$8pC.twS9boDqDHmLHe9vQ/;
                ssh-rsa "ssh-rsa ";
                }
        }
    }
    services {
        ssh {
            root-login allow;
            sftp-server;
        }
        netconf {
            ssh;
        }
    }
    syslog {
        user * {
            any emergency;
        }
        file messages {
            any notice;
            authorization info;
        }
        file interactive-commands {
            interactive-commands any;
        }
    }
    
}
system {
    management-instance;
}

chassis {
    network-services enhanced-ip;
}
interfaces {
   fxp0 {
      unit 0 {
         family inet {
         address 172.16.10.3/24;
         }
      }
    }
}
interfaces {
lo0 {
        unit 0 {
        family inet {
                address 10.100.255.3/32 {
                    primary;
                    preferred;
                }
                }
        family iso {
                address 49.0001.0001.0001.0003.00;
            }
            }
        }
ge-0/0/0 {
        mtu 9000;
        description "connection to port ge-0/0/0 of p3";
        unit 0 {
        family inet {
                address 10.100.0.8/31;
                }
        family mpls;
        family iso;
            }
        }
ge-0/0/1 {
        mtu 9000;
        description "connection to port ge-0/0/0 of p4";
        unit 0 {
        family inet {
                address 10.100.0.10/31;
                }
        family mpls;
        family iso;
            }
        }
ge-0/0/2 {
        mtu 9000;
        description "connection to port eth3 of client";
        }
ge-0/0/3 {
        mtu 9000;
        description "connection to port eth7 of client";
        }
ge-0/0/4 {
        mtu 9000;
        description "connection to port eth11 of client";
        }
}
services {
    rpm {
        twamp {
            server {
                authentication-mode none;
                light;
            }
        }
    }
}
protocols { 
	isis {
                traffic-engineering {
                        l3-unicast-topology;
                        advertisement always;
                    }
                    level 2 {
                        authentication-key "$9$H.fQ69A0BE9CK8LxsYTzF/9AtuO1Ec"; ## SECRET-DATA
                        authentication-type md5;
                    }
                        interface  lo0.0 {
                                    level 1 disable;
                                    passive; 
                                    }
                            interface  ge-0/0/0.0 {
                                    level 1 disable;
                                    delay-measurement;
                                    family inet {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                        family inet6 {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                    point-to-point; 
                                    }
                            interface  ge-0/0/1.0 {
                                    level 1 disable;
                                    delay-measurement;
                                    family inet {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                        family inet6 {
                                            bfd-liveness-detection {
                                                minimum-interval 100;
                                            }
                                        }
                                    point-to-point; 
                                    }
                            }
        mpls {
                statistics {
                        interval 10;
                    }
                    sensor-based-stats;
                    
                                interface ge-0/0/0.0;
                            
                                interface ge-0/0/1.0;
                            }
        rsvp {
                
                                interface ge-0/0/0.0;
                            
                                interface ge-0/0/1.0;
                            }
        ldp {
                
                                interface ge-0/0/0.0;
                            
                                interface ge-0/0/1.0;
                            }
        }
protocols {
   lldp {
      interface all;
      interface fxp0 {
        disable;
      }
      }
}
routing-options {
    router-id 10.100.255.3;
    route-distinguisher-id 10.100.255.3;
       
    forwarding-table {
        export LB;
    }
}
policy-options {
    policy-statement LB {
        term 1 {
            then {
                load-balance per-flow;
                accept;
            }
        }
    }
}
