---
# site1 only
name: dccx
pod: 
  type: vmm
  vmmserver: q-pod35-vmm.englab.juniper.net
  user: irzan
  home_dir : /vmm/data/user_disks/irzan
images:
  gw: images/gw.qcow2
  ubuntu: images/ubuntu24.04.qcow2
  ubuntu1: images/ubuntu26.04.qcow2
  ubuntu2: images/ubuntu26.04_frr_ovs_lxd.qcow2
  vsrx: images/junos-vsrx3-x86-64-25.4R1.12.qcow2
  vjunos_switch: images/vJunos-switch-25.4R1.12.qcow2
  vjunos_router: images/vJunos-router-25.4R1.11.qcow2
  aos_cx: images/arubaoscx.qcow2
  afc: images/afc.qcow2
  sonic: images/sonic-vm.qcow2
  #vjunos_evolved: images/vJunosEvolved-25.2R1.8-EVO.qcow2
junos_login:
  login: admin
  password: pass01
fabric:
  #subnet: 172.16.20.0/24
  #subnet6: fc00:dead:beef:ffff::/64
  topology:
  # there are five field: status, VM node A, interface of node A, VM node Z, interface of node Z
  # value for the field status:
  # bit 0 : ipv4
  # bit 1 : ipv6
  # bit 2 : iso
  # bit 3 : mpls
  # bit 4 : isis
  # bit 5 : rsvp
  # bit 6 : ldp
  # bit 7 : delay_measurement_rpm
  # 0b01111101 : mpls 0x7d
  # srv6 : 0x16
  # 0x3d means enable family ipv4, iso and mpls, and enable protocol isis and rsvp
  # 0xbd means enable family ipv4, iso and mpls, and enable protocol isis and rsvp, and delay measurement using RPM
    - [ 0x0, spine1, em1, leaf1, em1 ]
    - [ 0x0, spine1, em2, leaf2, em1 ]
    - [ 0x0, spine1, em3, leaf3, em1 ]
    - [ 0x0, spine1, em4, leaf4, em1 ]
    - [ 0x0, spine1, em5, leaf5, em1 ]
    - [ 0x0, spine1, em6, leaf6, em1 ]
    - [ 0x0, spine2, em1, leaf1, em2 ]
    - [ 0x0, spine2, em2, leaf2, em2 ]
    - [ 0x0, spine2, em3, leaf3, em2 ]
    - [ 0x0, spine2, em4, leaf4, em2 ]
    - [ 0x0, spine2, em5, leaf5, em2 ]
    - [ 0x0, spine2, em6, leaf6, em2 ]
    - [ 0x0, spine1, em7, spine2, em7 ]
    - [ 0x0, spine1, em8, spine2, em8 ]
    - [ 0x0, leaf1, em3, leaf2, em3 ]
    - [ 0x0, leaf3, em3, leaf4, em3 ]
    - [ 0x0, leaf5, em3, leaf6, em3 ]
vm:
  gw:
    type: gw
    interfaces:
      em0: 
        bridge: external
      em1: 
        bridge: mgmt
        family:
          inet: 172.16.11.254/24
        dhcp_range: 172.16.11.1 - 172.16.11.100  
      em2:
        bridge: l5p4
        mtu: 9000
        family:
          inet: 10.1.255.128/31
          inet6: fc00:dead:beef:aaff::0/127
      em3:
        bridge: l6p4
        mtu: 9000
        family:
          inet: 10.1.255.130/31
          inet6: fc00:dead:beef:aaff::2/127
  ac:
    type: pcmedium
    os: ubuntu
    interfaces:
      em0: 
        bridge: mgmt
        family:
          inet: 172.16.11.100/24
          gateway4: 172.16.11.254
  afc:
