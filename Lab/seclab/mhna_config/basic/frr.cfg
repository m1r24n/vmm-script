sudo sed -i -e "s/bgpd=no/bgpd=yes/" /etc/frr/daemons
sudo sed -i -e "s/bfdd=no/bfdd=yes/" /etc/frr/daemons
sudo systemctl restart frr


ipv6 route ::/0 Null0
!
router bgp 4200000001
 no bgp ebgp-requires-policy
 neighbor 172.16.255.129 remote-as 4200000011
 neighbor 172.16.255.129 bfd
 neighbor 172.16.255.129 bfd profile BFDPROF
 neighbor 172.16.255.131 remote-as 4200000012
 neighbor 172.16.255.131 bfd
 neighbor 172.16.255.131 bfd profile BFDPROF
 neighbor 172.16.255.141 remote-as 4200000020
 neighbor 172.16.255.141 bfd
 neighbor 172.16.255.141 bfd profile BFDPROF
 neighbor 172.16.255.143 remote-as 4200000030
 neighbor 172.16.255.143 bfd
 neighbor 172.16.255.143 bfd profile BFDPROF
 neighbor fc00:dead:beef:ffff::1 remote-as 4200000011
 neighbor fc00:dead:beef:ffff::1 bfd
 neighbor fc00:dead:beef:ffff::1 bfd profile BFDPROF
 neighbor fc00:dead:beef:ffff::3 remote-as 4200000012
 neighbor fc00:dead:beef:ffff::3 bfd
 neighbor fc00:dead:beef:ffff::3 bfd profile BFDPROF
 neighbor fc00:dead:beef:ffff::141 remote-as 4200000020
 neighbor fc00:dead:beef:ffff::141 bfd
 neighbor fc00:dead:beef:ffff::141 bfd profile BFDPROF
 neighbor fc00:dead:beef:ffff::143 remote-as 4200000030
 neighbor fc00:dead:beef:ffff::143 bfd
 neighbor fc00:dead:beef:ffff::143 bfd profile BFDPROF
 !
 address-family ipv4 unicast
  network 0.0.0.0/0
  maximum-paths 4
  maximum-paths ibgp 4
 exit-address-family
 !
 address-family ipv6 unicast
  network ::/0
  neighbor fc00:dead:beef:ffff::1 activate
  neighbor fc00:dead:beef:ffff::3 activate
  neighbor fc00:dead:beef:ffff::141 activate
  neighbor fc00:dead:beef:ffff::143 activate
 exit-address-family
exit
!
access-list acl1 seq 5 permit 0.0.0.0/0 exact-match
!
route-map to_fw permit 1
 match ip address acl1
exit
!
bfd
 profile BFDPROF
  echo-mode
  echo transmit-interval 100
  echo receive-interval 100
 exit
 !
exit
!
end