---
name: mhna
pod:
  type: vmm
  vmmserver: q-pod26-vmm.englab.juniper.net
  user: irzan
  #vmmpassword: AnaMabokCoy
  home_dir : /vmm/data/user_disks/irzan
images:
  gw: images/gw.qcow2
  ubuntu: images/ubuntu24.04.qcow2
  bridge: images/bridge.qcow2
  vjunos_router: images/vJunos-router-25.4R1.11.qcow2
  vjunos_evolved: images/vJunosEvolved-25.2R1.8-EVO.qcow2
  vsrx: images/junos-vsrx3-x86-64-25.4R1.12.qcow2
  sd: images/sd/sd-25.4.1-disk1.qcow2
junos_login:
  login: admin
  password: pass01
#pcep_server: 172.16.12.3
#isis_dm: true
#paragon_ingest: 172.16.12.1
# snmp: 
#   server: 172.16.255.4
#   ro_community: public
# wg:
#   prefix_allowed:
#   - 172.16.11.0/24 
#   - 172.16.10.0/24
#   - 172.16.12.0/24 
#   - 10.100.255.0/24
# fabric:
#   subnet: 10.100.0.0/24
#   topology:
#   # there are five field: status, VM node A, interface of node A, VM node Z, interface of node Z
#   # value for the field status:
#   # bit 0 : ipv4
#   # bit 1 : ipv6
#   # bit 2 : iso
#   # bit 3 : mpls
#   # bit 4 : isis
#   # bit 5 : rsvp
#   # bit 6 : ldp
#   # bit 7 : delay_measurement_rpm
#   # 0x3d means enable family ipv4, iso and mpls, and enable protocol isis and rsvp
#   # 0xbd means enable family ipv4, iso and mpls, and enable protocol isis and rsvp, and delay measurement using RPM
#   # ingress controller: 172.16.255.1
#   # NGIX ingress controller: 172.16.255.2
#   # insight : 172.16.255.3
#   # SNMP trap: 172.16.255.4
#   # Netflow : 172.16.255.5
#   # PCE serveR: 172.16.255.6
#     - [ 0x1, fw1, ge-0/0/0, nw, ge-0/0/1 ]
#     - [ 0x1, fw2, ge-0/0/0, nw, ge-0/0/2 ]
#     - [ 0x1, fw3, ge-0/0/0, nw, ge-0/0/3 ]
vm:
  gw:
    type: gw
    interfaces:
      em0: 
        bridge: external
      em1: 
        bridge: mgmt
        family:
          inet: 172.16.11.254/24
        dhcp_range: 172.16.11.1-172.16.11.200
      em2: 
        bridge: site1a
        family:
          inet: 172.16.255.128/31
          inet6: fc00:dead:beef:ffff::0/127
      em3:
        bridge: site1b
        family:
          inet: 172.16.255.130/31
          inet6: fc00:dead:beef:ffff::2/127
      em4:
        bridge: extsvr
        family:
          inet: 172.16.14.254/24
          inet6: fc00:dead:beef:ff14::1/64
      em5:
        bridge: site2
        family:
          inet: 172.16.255.140/31
          inet6: fc00:dead:beef:ffff::140/127
      em6:
        bridge: site3
        family:
          inet: 172.16.255.142/31
          inet6: fc00:dead:beef:ffff::142/127
  ac:
    type: pcmedium
    os: ubuntu
    interfaces:
      em0: 
        bridge: mgmt
        family:
          inet: 172.16.11.100/24
          gateway4: 172.16.11.254
  fw1a:
    type: vsrx
    vnc: yes
    interfaces:
      mgmt: 
        bridge: mgmt
        family:
          inet: 172.16.11.1/24
          gateway4: 172.16.11.254
      ge-0/0/0:
        bridge: site1a
        mtu: 9000
        family:
          inet: 172.16.255.129/31
      ge-0/0/1:
        bridge: icl
        mtu: 9000
        family:
          inet: 172.16.255.132/31
      ge-0/0/2:
        bridge: icd
        mtu: 9000
        family:
          inet: 172.16.255.138/31
      ge-0/0/3:
        bridge: fw1a
        mtu: 9000
        family:
          inet: 172.16.255.134/31
  fw1b:
    type: vsrx
    vnc: yes
    interfaces:
      mgmt: 
        bridge: mgmt
        family:
          inet: 172.16.11.2/24
          gateway4: 172.16.11.254
      ge-0/0/0:
        bridge: site1b
        mtu: 9000
        family:
          inet: 172.16.255.131/31
      ge-0/0/1:
        bridge: icl
        mtu: 9000
        family:
          inet: 172.16.255.133/31
      ge-0/0/2:
        bridge: icd
        mtu: 9000
        family:
          inet: 172.16.255.139/31
      ge-0/0/3:
        bridge: fw1b
        mtu: 9000
        family:
          inet: 172.16.255.136/31
  fw2:
    type: vsrx
    vnc: yes
    interfaces:
      mgmt: 
        bridge: mgmt
        family:
          inet: 172.16.11.3/24
          gateway4: 172.16.11.254
      ge-0/0/0:
        bridge: site2
        mtu: 9000
        family:
          inet: 172.16.255.141/31
          inet6: fc00:dead:beef:ffff::141/127
      ge-0/0/1:
        bridge: clientsite2
        mtu: 9000
  fw3:
    type: vsrx
    vnc: yes
    interfaces:
      mgmt: 
        bridge: mgmt
        family:
          inet: 172.16.11.4/24
          gateway4: 172.16.11.254
      ge-0/0/0:
        bridge: site3
        mtu: 9000
        family:
          inet: 172.16.255.143/31
          inet6: fc00:dead:beef:ffff::143/127
      ge-0/0/1:
        bridge: clientsite3
        mtu: 9000
  r1:
    type: vjunos_router
    vnc: yes
    interfaces:
      mgmt: 
        bridge: mgmt
        family:
          inet: 172.16.11.5/24
          gateway4: 172.16.11.254
      ge-0/0/0:
        bridge: clientsite1
        mtu: 9000
      ge-0/0/1:
        bridge: fw1a
        mtu: 9000
        family:
          inet: 172.16.255.135/31
      ge-0/0/2:
        bridge: fw1b
        mtu: 9000
        family:
          inet: 172.16.255.137/31
  client1:
    type: pchpv1
    vnc: yes
    interfaces:
      em0: 
        bridge: mgmt
        family:
          inet: 172.16.11.6/24
          gateway4: 172.16.11.254
      em1: 
        bridge: clientsite1
        mtu: 9000
      em2: 
        bridge: extsvr
        mtu: 9000
      em3: 
        bridge: clientsite2
        mtu: 9000
      em4: 
        bridge: clientsite3
        mtu: 9000
