forwarding-options {
    vxlan-routing {
        next-hop 45056;
        interface-num 8192;
        overlay-ecmp;
    }
    evpn-vxlan {
        shared-tunnels;
    }
}
routing-instances {
    RZ1 {
        instance-type vrf;
        interface lo0.2;
        route-distinguisher 172.16.0.0:2;
        vrf-target target:10001:1;
        routing-options {
            multipath;
            auto-export;
            graceful-restart;
            rib RZ1.inet6.0 {
                multipath;
            }
        }
        protocols {
            evpn {
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 10001;
                    export BGP-AOS-Policy-RZ1;
                }
            }
        }
    }
    RZ2 {
        instance-type vrf;
        interface irb.201;
        interface lo0.3;
        interface et-0/0/50.1002;
        route-distinguisher 172.16.0.0:3;
        vrf-target target:10000:1;
        routing-options {
            multipath;
            auto-export;
            graceful-restart;
            rib RZ2.inet6.0 {
                multipath;
            }
        }
        protocols {
            bgp {
                group l3rtr {
                    type external;
                    multipath {
                        multiple-as;
                    }
                    multihop {
                        ttl 1;
                    }
                    family inet {
                        unicast {
                            loops 2;
                        }
                    }
                    family inet6 {
                        unicast {
                            loops 2;
                        }
                    }
                    neighbor fc00:dead:beef:ffff::3 {
                        description "facing_gw1";
                        local-address fc00:dead:beef:ffff::2;
                        peer-as 4200000002;
                        multihop {
                            ttl 2;
                        }
                        hold-time 30;
                        family inet6 {
                            unicast;
                        }
                        import ( RoutesFromExt-RZ2-Default_immutable );
                        export ( RoutesToExt-RZ2-Default_immutable );
                    }
                    neighbor 10.0.0.3 {
                        description "facing_gw1";
                        local-address 10.0.0.2;
                        peer-as 4200000002;
                        multihop {
                            ttl 2;
                        }
                        hold-time 30;
                        family inet {
                            unicast;
                        }
                        import ( RoutesFromExt-RZ2-Default_immutable );
                        export ( RoutesToExt-RZ2-Default_immutable );
                    }
                }
                graceful-restart {
                    dont-help-shared-fate-bfd-down;
                }
            }
            evpn {
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 10000;
                    export BGP-AOS-Policy-RZ2;
                }
            }
        }
    }
    evpn-1 {
        instance-type mac-vrf;
        protocols {
            evpn {
                vni-options {
                    vni 10002 {
                        vrf-target target:10002:1;
                    }
                    vni 10003 {
                        vrf-target target:10003:1;
                    }
                    vni 10004 {
                        vrf-target target:10004:1;
                    }
                }
                encapsulation vxlan;
                default-gateway do-not-advertise;
                duplicate-mac-detection {
                    auto-recovery-time 9;
                }
                extended-vni-list all;
            }
        }
        vtep-source-interface lo0.0 inet6;
        service-type vlan-aware;
        route-distinguisher 172.16.0.0:65534;
        vrf-target target:100:100;
        interface ae1;
        interface ae2;
        interface ae3;
        vlans {
            vn101 {
                vlan-id 101;
                description "vlan101";
                no-arp-suppression;
                vxlan {
                    vni 10002;
                }
            }
            vn102 {
                vlan-id 102;
                description "vlan102";
                no-arp-suppression;
                vxlan {
                    vni 10003;
                }
            }
            vn201 {
                vlan-id 201;
                description "vlan201";
                no-arp-suppression;
                vxlan {
                    vni 10004;
                }
                l3-interface irb.201;
            }
        }
    }
}
routing-options {
    router-id 172.16.0.0;
    autonomous-system 4200000000;
    graceful-restart;
    forwarding-table {
        export PFE-LB;
        ecmp-fast-reroute;
        chained-composite-next-hop {
            ingress {
                evpn;
            }
        }
    }
}
protocols {
    bgp {
        log-updown;
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
        multipath;
        group l3clos-l {
            type external;
            multipath {
                multiple-as;
            }
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
            }
            vpn-apply-export;
            neighbor fc01:a05:fab::2 {
                description "facing_collapsed1-001-leaf2";
                local-address fc01:a05:fab::3;
                peer-as 4200000001;
                family inet {
                    unicast {
                        extended-nexthop;
                    }
                }
                family inet6 {
                    unicast;
                }
                export ( BGP-AOS-Policy );
            }
            neighbor fc01:a05:fab::4 {
                description "facing_collapsed1-001-leaf2";
                local-address fc01:a05:fab::5;
                peer-as 4200000001;
                family inet {
                    unicast {
                        extended-nexthop;
                    }
                }
                family inet6 {
                    unicast;
                }
                export ( BGP-AOS-Policy );
            }
        }
        group l3clos-l-evpn {
            type external;
            multipath {
                multiple-as;
            }
            multihop {
                no-nexthop-change;
                ttl 1;
            }
            family evpn {
                signaling {
                    loops 2;
                }
            }
            bfd-liveness-detection {
                minimum-interval 3000;
                multiplier 3;
            }
            vpn-apply-export;
            neighbor fc01:a05:fab::1 {
                description "facing_collapsed1-001-leaf2-evpn-overlay";
                local-address fc01:a05:fab::;
                peer-as 4200000001;
                family evpn {
                    signaling;
                }
                export ( EVPN_EXPORT );
            }
        }
    }
    lldp {
        port-id-subtype interface-name;
        port-description-type interface-description;
        neighbour-port-info-display port-id;
        interface all;
    }
    replace: rstp {
        bridge-priority 0;
        interface ae1 {
            edge;
        }
        interface ae2 {
            edge;
        }
        interface ae3 {
            edge;
        }
        bpdu-block-on-edge;
    }
    evpn {
        no-core-isolation;
    }
    router-advertisement {
        interface et-0/0/48 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
        interface et-0/0/49 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
        interface et-0/0/50.1002 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
        interface irb.201 {
            max-advertisement-interval 30;
            min-advertisement-interval 10;
        }
    }
}
policy-options {
    community DEFAULT_DIRECT_V4 {
        members [ 1:20007 21001:26000 ];
    }
    community DEFAULT_DIRECT_V6 {
        members [ 1:20008 21001:26000 ];
    }
    community FABRIC_COMMUNITIES {
        members [ 0:12 0:13 0:14 0:15 .+:200.. 2....:260.. ];
    }
    community RZ1_COMMUNITY_V4 {
        members [ 1:20007 21002:26000 ];
    }
    community RZ1_COMMUNITY_V6 {
        members [ 1:20008 21002:26000 ];
    }
    community RZ2_COMMUNITY_V4 {
        members [ 1:20007 21003:26000 ];
    }
    community RZ2_COMMUNITY_V6 {
        members [ 1:20008 21003:26000 ];
    }
    community RoutesFromExt-RZ2-Default_immutable {
        members [ 1:20009 21003:26000 ];
    }
    community RoutesFromExtV6-RZ2-Default_immutable {
        members [ 1:20010 21003:26000 ];
    }
    route-filter-list RoutesFromExt-RZ2-Default_immutable {
        0.0.0.0/0 upto /32;
    }
    route-filter-list RoutesToExt-RZ2-Default_immutable {
        172.16.0.2/31 upto /32;
        192.168.201.0/24 upto /32;
    }
    route-filter-list RoutesFromExtV6-RZ2-Default_immutable {
        0::0/0 upto /128;
    }
    route-filter-list RoutesToExtV6-RZ2-Default_immutable {
        fc00:dead:beef:a201::/64 upto /128;
        fc01:a05:fab::8/127 upto /128;
    }
    policy-statement AllPodNetworks {
        term AllPodNetworks-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V4;
                accept;
            }
        }
        term AllPodNetworks-20 {
            from {
                family inet6;
                protocol direct;
            }
            then {
                community add DEFAULT_DIRECT_V6;
                accept;
            }
        }
        term AllPodNetworks-100 {
            then reject;
        }
    }
    policy-statement AllPodNetworks-RZ1 {
        term AllPodNetworks-RZ1-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add RZ1_COMMUNITY_V4;
                accept;
            }
        }
        term AllPodNetworks-RZ1-20 {
            from {
                family inet6;
                protocol direct;
            }
            then {
                community add RZ1_COMMUNITY_V6;
                accept;
            }
        }
        term AllPodNetworks-RZ1-100 {
            then reject;
        }
    }
    policy-statement AllPodNetworks-RZ2 {
        term AllPodNetworks-RZ2-10 {
            from {
                family inet;
                protocol direct;
            }
            then {
                community add RZ2_COMMUNITY_V4;
                accept;
            }
        }
        term AllPodNetworks-RZ2-20 {
            from {
                family inet6;
                protocol direct;
            }
            then {
                community add RZ2_COMMUNITY_V6;
                accept;
            }
        }
        term AllPodNetworks-RZ2-100 {
            then reject;
        }
    }
    policy-statement BGP-AOS-Policy {
        term BGP-AOS-Policy-10 {
            from {
                policy AllPodNetworks;
            }
            then accept;
        }
        term BGP-AOS-Policy-20 {
            from {
                protocol bgp;
            }
            then accept;
        }
        term BGP-AOS-Policy-100 {
            then reject;
        }
    }
    policy-statement BGP-AOS-Policy-RZ1 {
        term BGP-AOS-Policy-RZ1-10 {
            from {
                policy AllPodNetworks-RZ1;
            }
            then accept;
        }
        term BGP-AOS-Policy-RZ1-20 {
            from {
                protocol bgp;
            }
            then accept;
        }
        term BGP-AOS-Policy-RZ1-100 {
            then reject;
        }
    }
    policy-statement BGP-AOS-Policy-RZ2 {
        term BGP-AOS-Policy-RZ2-10 {
            from {
                policy AllPodNetworks-RZ2;
            }
            then accept;
        }
        term BGP-AOS-Policy-RZ2-20 {
            from {
                protocol bgp;
            }
            then accept;
        }
        term BGP-AOS-Policy-RZ2-100 {
            then reject;
        }
    }
    policy-statement EVPN_EXPORT {
        term EVPN_EXPORT-4095 {
            then accept;
        }
    }
    policy-statement RoutesFromExt-RZ2-Default_immutable {
        term RoutesFromExt-RZ2-Default_immutable-10 {
            from {
                route-filter-list RoutesFromExt-RZ2-Default_immutable;
                family inet;
            }
            then {
                community add RoutesFromExt-RZ2-Default_immutable;
                accept;
            }
        }
        term RoutesFromExt-RZ2-Default_immutable-20 {
            from {
                route-filter-list RoutesFromExtV6-RZ2-Default_immutable;
                family inet6;
            }
            then {
                community add RoutesFromExtV6-RZ2-Default_immutable;
                accept;
            }
        }
        term RoutesFromExt-RZ2-Default_immutable-30 {
            from {
                family inet;
            }
            then reject;
        }
        term RoutesFromExt-RZ2-Default_immutable-40 {
            from {
                family inet6;
            }
            then reject;
        }
    }
    policy-statement RoutesToExt-RZ2-Default_immutable {
        term RoutesToExt-RZ2-Default_immutable-10 {
            from {
                route-filter-list RoutesToExt-RZ2-Default_immutable;
                family inet;
            }
            then {
                community delete FABRIC_COMMUNITIES;
                next-hop self;
                accept;
            }
        }
        term RoutesToExt-RZ2-Default_immutable-20 {
            from {
                route-filter-list RoutesToExtV6-RZ2-Default_immutable;
                family inet6;
            }
            then {
                community delete FABRIC_COMMUNITIES;
                next-hop self;
                accept;
            }
        }
        term RoutesToExt-RZ2-Default_immutable-30 {
            from {
                family inet;
            }
            then reject;
        }
        term RoutesToExt-RZ2-Default_immutable-40 {
            from {
                family inet6;
            }
            then reject;
        }
    }
    policy-statement PFE-LB {
        then {
            load-balance per-packet;
        }
    }
}

