---
name: k8s
pod: 
  type: vmm
  vmmserver: q-pod32-vmm.englab.juniper.net
  home_dir : /vmm/data/user_disks/irzan
  user: irzan
images:
  gw: images/gw.qcow2
  ubuntu: images/ubuntu24.04.qcow2
junos_login:
  login: admin
  password: pass01
wg:
  prefix_allowed:
  - 172.16.1.0/24 
  - 172.16.11.0/24
  - 172.16.12.0/24
  - 172.16.13.0/24
vm:
  gw:
    type: gw
    os: gw
    interfaces:
      em0: 
        bridge: external
      em1: 
        bridge: lan1
        family:
          inet: 172.16.11.1/24
        dhcp_range: 172.16.11.5-172.16.11.100
        mtu: 9000
      em2: 
        bridge: lan2
        family:
          inet: 172.16.12.1/24
        mtu: 9000
      em3: 
        bridge: lan3
        family:
          inet: 172.16.13.1/24
        mtu: 9000
        dhcp_range: 172.16.13.5-172.16.13.15
  node0a:
    type: pcsmall
    os: ubuntu
    interfaces:
      em0: 
        bridge: lan1 
        family:
          inet: 172.16.11.11/24 
          gateway4: 172.16.11.1
        mtu: 9000
      em1: 
        bridge: lan2
        family:
          inet: 172.16.12.11/24 
        mtu: 9000
  node0b:
    type: pcsmall
    os: ubuntu
    interfaces:
      em0: 
        bridge: lan1 
        family:
          inet: 172.16.11.12/24 
          gateway4: 172.16.11.1
        mtu: 9000
      em1: 
        bridge: lan2
        family:
          inet: 172.16.12.12/24 
        mtu: 9000
  node0c:
    type: pcsmall
    os: ubuntu
    interfaces:
      em0: 
        bridge: lan1 
        family:
          inet: 172.16.11.13/24 
          gateway4: 172.16.11.1
        mtu: 9000
      em1: 
        bridge: lan2
        family:
          inet: 172.16.12.13/24 
        mtu: 9000
  node1:
    type: pchpv1
    os: ubuntu
    hd2: 50g
    hd3: 50g
    interfaces:
      em0: 
        bridge: lan1
        family:
          inet: 172.16.11.21/24 
          gateway4: 172.16.11.1
        mtu: 9000
      em1: 
        bridge: lan2
        family:
          inet: 172.16.12.21/24
        mtu: 9000
  node2:
    type: pchpv1
    os: ubuntu
    hd2: 50g
    hd3: 50g
    interfaces:
      em0: 
        bridge: lan1
        family:
          inet: 172.16.11.22/24 
          gateway4: 172.16.11.1
        mtu: 9000
      em1: 
        bridge: lan2
        family:
          inet: 172.16.12.22/24 
        mtu: 9000
  node3:
    type: pchpv1
    os: ubuntu
    hd2: 50g
    hd3: 50g
    interfaces:
      em0: 
        bridge: lan1
        family:
          inet: 172.16.11.23/24 
          gateway4: 172.16.11.1
        mtu: 9000
      em1: 
        bridge: lan2
        family:
          inet: 172.16.12.23/24 
        mtu: 9000
  node4:
    type: pchpv1
    os: ubuntu
    hd2: 50g
    hd3: 50g
    interfaces:
      em0: 
        bridge: lan1
        family:
          inet: 172.16.11.24/24 
          gateway4: 172.16.11.1
        mtu: 9000
      em1: 
        bridge: lan2
        family:
          inet: 172.16.12.24/24 
        mtu: 9000
  registry:
    type: pcmedium
    os: ubuntu
    interfaces:
      em0: 
        bridge: lan3
        family:
          inet: 172.16.13.10/24 
          gateway4: 172.16.13.1
  ac:
    type: pcmedium
    os: ubuntu
    interfaces:
      em0: 
        bridge: lan3
        family:
          inet: 172.16.13.11/24 
          gateway4: 172.16.13.1
